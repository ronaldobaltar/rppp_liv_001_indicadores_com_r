project:
  type: book

lang: pt-BR

book:
  title: Métodos Computacionais para Indicadores Sociais e Políticas Públicas
  subtitle: Usando R  
  author: Ronaldo Baltar e Cláudia Baltar
  date: today
  date-format: 'YYYY'
  publisher: Editora IHC
  publisher-place: Londrina
  chapters:
    - index.qmd
    - part: Fundamentos
      chapters:
        - intro.qmd
        # - modelo_s_margin.qmd
        - cap_01_indicadores_com_r.qmd
    - part: Referências
      chapters:
      - references.qmd
      - sobre_os_autores.qmd

format:
  html:
    theme: cosmo
    code-copy: true

  pdf:
    documentclass: scrbook    
    papersize: A4
    fontsize: 11pt
    classoption:
      - oneside
      - openright
    include-in-header: preamble.tex
    #include-in-header:
    #   text: |
    #    \typeout{=== FUNCIONOU ===}
    #    \usepackage{xcolor}
    #    \pagecolor{yellow}
  
  epub: 
    toc: true 
    cover-image: capa.jpg  
    highlight-style: arrow
    
bibliography: references.bib
csl: abnt.csl          # ABNT para todos os formatos   

execute:
  warning: false
  message: false